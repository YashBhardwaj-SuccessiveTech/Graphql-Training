type User {
  id: ID!
  name: String!
  email: String!
  password: String!
  posts: [Post!]!
  comments: [Comment!]!
  role: String!
}
 
type Post {
  id: ID!
  title: String!
  author: User
  content: String!
  comments: [Comment]
  createdAt: String!
}

type Comment {
  id: ID!
  text: String!
  author: User!
  post: Post!
}

type userauth {
  success: Boolean
  message: String
}

type updateUserRes {
  success: Boolean!
  message: String!
  user: User
}
