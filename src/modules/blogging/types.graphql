type User{
    id: ID!
    name: String!
    email: String!
    posts: [Post!]!
    comments: [Comment!]!
}

type Post{
    id: ID!
    title: String!
    author: User!
    content: String!
    comments: [Comment!]!
    createdAt: String!
}

type Comment{
    id: ID!
    text: String!
    author: User!
    post: Post!
}
